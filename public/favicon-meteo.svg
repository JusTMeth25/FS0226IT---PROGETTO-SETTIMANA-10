<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Meteo App</title>
  <desc id="desc">Sole dietro una nuvola</desc>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EAF8FF"/>
      <stop offset="100%" stop-color="#CFEFFF"/>
    </linearGradient>

    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD76A"/>
      <stop offset="100%" stop-color="#FF9F43"/>
    </linearGradient>

    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#DDEBF5"/>
    </linearGradient>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#2C6E9B" flood-opacity=".18"/>
    </filter>
  </defs>

  <rect width="64" height="64" rx="16" fill="url(#sky)"/>

  <g stroke="#FFB347" stroke-width="2.6" stroke-linecap="round">
    <path d="M22 10v4"/>
    <path d="M22 34v4"/>
    <path d="M10 22h4"/>
    <path d="M30 22h4"/>
    <path d="m13.5 13.5 2.8 2.8"/>
    <path d="m27.7 27.7 2.8 2.8"/>
    <path d="m30.5 13.5-2.8 2.8"/>
    <path d="m16.3 27.7-2.8 2.8"/>
  </g>

  <circle cx="22" cy="22" r="8" fill="url(#sun)"/>

  <path
    d="M18 48h29.5a8.5 8.5 0 0 0 .7-17 12 12 0 0 0-22.8-2.7A10 10 0 0 0 18 48Z"
    fill="url(#cloud)"
    stroke="#B9D5E8"
    stroke-width="2"
    stroke-linejoin="round"
    filter="url(#shadow)"
  />
</svg>
